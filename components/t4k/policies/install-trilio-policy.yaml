apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: install-trilio
  namespace: default
  annotations:
    policy.open-cluster-management.io/categories: CA Security Assessment and Authorization
    policy.open-cluster-management.io/controls: CA-2 Security Assessments, CA-7 Continuous Monitoring
    policy.open-cluster-management.io/standards: NIST SP 800-53
spec:
  disabled: false
  remediationAction: enforce
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: trilio-catalog-source
        spec:
          remediationAction: enforce
          severity: high
          # Version-driven: create a custom grpc CatalogSource ONLY when the hub
          # ConfigMap trilio-operator-configmap has a non-empty catalogSourceImage
          # (custom-catalog profiles, e.g. values/ocp-4.22). Certified profiles
          # (values/ocp-4.20) leave it empty ⇒ no CatalogSource, install comes
          # straight from OperatorHub/certified-operators.
          # Hub templating ({{hub ... hub}}) resolves on the hub first; the
          # {{- if }} then runs on the managed cluster over the resolved value.
          object-templates-raw: |
            {{- $img := "{{hub fromConfigMap "" "trilio-operator-configmap" "catalogSourceImage" hub}}" }}
            {{- if $img }}
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: CatalogSource
                metadata:
                  name: '{{hub fromConfigMap "" "trilio-operator-configmap" "catalogSource" hub}}'
                  namespace: openshift-marketplace
                spec:
                  sourceType: grpc
                  image: {{ $img | quote }}
                  displayName: Trilio T4K (custom)
                  publisher: Trilio
            {{- end }}
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: check-ns-trilio-system
        spec:
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: trilio-system
          remediationAction: enforce
          severity: high
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: trilio-operator-group
        spec:
          # Without an OperatorGroup in trilio-system, OLM never generates an
          # InstallPlan and the Subscription hangs. spec:{} = AllNamespaces,
          # matching the cluster-scoped TrilioVaultManager (applicationScope: Cluster).
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1
                kind: OperatorGroup
                metadata:
                  name: trilio-system-og
                  namespace: trilio-system
                spec: {}
          remediationAction: enforce
          severity: high
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: trilio-operator-subscription
        spec:
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: k8s-triliovault
                  namespace: trilio-system
                spec:
                  name: k8s-triliovault
                  # All three read from the hub ConfigMap trilio-operator-configmap,
                  # supplied per OCP profile under values/ocp-<ver>/.
                  channel: '{{hub fromConfigMap "" "trilio-operator-configmap" "channel" hub}}'
                  startingCSV: '{{hub fromConfigMap "" "trilio-operator-configmap" "startingCSV" hub}}'
                  installPlanApproval: Automatic
                  source: '{{hub fromConfigMap "" "trilio-operator-configmap" "catalogSource" hub}}'
                  sourceNamespace: openshift-marketplace
          remediationAction: enforce
          severity: high
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: trilio-manager-configuration
        spec:
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: triliovault.trilio.io/v1
                kind: TrilioVaultManager
                metadata:
                  name: triliovault-manager
                  namespace: trilio-system
                spec:
                  applicationScope: Cluster
                  componentConfiguration:
                    ingress-controller:
                      enabled: false
                  dataJobResources:
                    requests:
                      cpu: 100m
                      memory: 800Mi
                  helmValues:
                    pollingIntervals:
                      manager: 30s
                      watcher: 30s
                      webSessionAccessTTL: 160h
                      webSessionMaxInactivityTTL: 24
                  metadataJobResources:
                    requests:
                      cpu: 10m
                      memory: 10Mi
                  tvkInstanceName: >
                    {{ (lookup "config.openshift.io/v1" "Infrastructure" ""
                    "cluster").status.infrastructureName }}
          remediationAction: enforce
          severity: high
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: trilio-license
        spec:
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: triliovault.trilio.io/v1
                kind: License
                metadata:
                  name: trilio-license
                  namespace: trilio-system
                spec:
                  key: '{{hub fromConfigMap "" "trilio-license" "key" hub}}'
                status:
                  status: Active
          remediationAction: enforce
          severity: high
