apiVersion: policy.open-cluster-management.io/v1
kind: Policy
metadata:
  name: install-trilio
  namespace: default
  annotations:
    policy.open-cluster-management.io/categories: CA Security Assessment and Authorization
    policy.open-cluster-management.io/controls: CA-2 Security Assessments, CA-7 Continuous Monitoring
    policy.open-cluster-management.io/standards: NIST SP 800-53
spec:
  disabled: false
  remediationAction: enforce
  policy-templates:
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: trilio-catalog-source
        spec:
          # OCP 4.22 stopgap: the Trilio operator has no bundle in Red Hat's
          # certified-operators catalog for 4.22, so we serve it from Trilio's
          # own grpc index. When a 4.22-certified bundle ships, drop this
          # template and set the Subscription back to source: certified-operators.
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: CatalogSource
                metadata:
                  name: k8s-triliovault-manifest
                  namespace: openshift-marketplace
                spec:
                  sourceType: grpc
                  image: quay.io/triliovault/k8s-triliovault-catalog:5.3.1-rc.3
                  displayName: Trilio T4K (custom)
                  publisher: Trilio
          remediationAction: enforce
          severity: high
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: check-ns-trilio-system
        spec:
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: v1
                kind: Namespace
                metadata:
                  name: trilio-system
          remediationAction: enforce
          severity: high
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: trilio-operator-group
        spec:
          # Without an OperatorGroup in trilio-system, OLM never generates an
          # InstallPlan and the Subscription hangs. spec:{} = AllNamespaces,
          # matching the cluster-scoped TrilioVaultManager (applicationScope: Cluster).
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1
                kind: OperatorGroup
                metadata:
                  name: trilio-system-og
                  namespace: trilio-system
                spec: {}
          remediationAction: enforce
          severity: high
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: trilio-operator-subscription
        spec:
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: operators.coreos.com/v1alpha1
                kind: Subscription
                metadata:
                  name: k8s-triliovault
                  namespace: trilio-system
                spec:
                  name: k8s-triliovault
                  channel: 5.3.x
                  startingCSV: k8s-triliovault-stable.5.3.1-rc.3
                  installPlanApproval: Automatic
                  source: k8s-triliovault-manifest
                  sourceNamespace: openshift-marketplace
          remediationAction: enforce
          severity: high
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: trilio-manager-configuration
        spec:
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: triliovault.trilio.io/v1
                kind: TrilioVaultManager
                metadata:
                  name: triliovault-manager
                  namespace: trilio-system
                spec:
                  applicationScope: Cluster
                  componentConfiguration:
                    ingress-controller:
                      enabled: false
                  dataJobResources:
                    requests:
                      cpu: 100m
                      memory: 800Mi
                  helmValues:
                    pollingIntervals:
                      manager: 30s
                      watcher: 30s
                      webSessionAccessTTL: 160h
                      webSessionMaxInactivityTTL: 24
                  logLevel: Info
                  metadataJobResources:
                    requests:
                      cpu: 10m
                      memory: 10Mi
                  tvkInstanceName: >
                    {{ (lookup "config.openshift.io/v1" "Infrastructure" ""
                    "cluster").status.infrastructureName }}
          remediationAction: enforce
          severity: high
    - objectDefinition:
        apiVersion: policy.open-cluster-management.io/v1
        kind: ConfigurationPolicy
        metadata:
          name: trilio-license
        spec:
          object-templates:
            - complianceType: musthave
              objectDefinition:
                apiVersion: triliovault.trilio.io/v1
                kind: License
                metadata:
                  name: trilio-license
                  namespace: trilio-system
                spec:
                  key: '{{hub fromConfigMap "" "trilio-license" "key" hub}}'
                status:
                  status: Active
          remediationAction: enforce
          severity: high
