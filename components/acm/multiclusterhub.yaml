# The MultiClusterHub operand stands up the actual ACM hub (console, policy
# propagator, placement, etc.). Applied after the operator CSV is Succeeded.
apiVersion: operator.open-cluster-management.io/v1
kind: MultiClusterHub
metadata:
  name: multiclusterhub
  namespace: open-cluster-management
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    # CRD (MultiClusterHub) is installed by the operator in wave 0; skip the
    # initial client dry-run so this CR doesn't fail validation before it exists.
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec: {}
