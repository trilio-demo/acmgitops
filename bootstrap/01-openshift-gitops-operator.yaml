# ONE-TIME bootstrap (run by hand, before the app-of-apps).
# Installs the OpenShift GitOps operator, which provides the Argo CD instance in
# namespace "openshift-gitops" that then runs everything else in this repo.
#   oc apply -f bootstrap/01-openshift-gitops-operator.yaml
# Wait for: oc get csv -n openshift-operators | grep gitops   # Succeeded
apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: openshift-gitops-operator
  namespace: openshift-operators
spec:
  channel: latest            # verify against your OCP version
  installPlanApproval: Automatic
  name: openshift-gitops-operator
  source: redhat-operators
  sourceNamespace: openshift-marketplace
